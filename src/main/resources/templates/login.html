<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ورود | وبلاگینو</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Vazirmatn",sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    linear-gradient(135deg,#0b1f73,#2b59ff,#4b7cff);

            overflow:hidden;

            position:relative;

        }

        body::before{

            content:"";

            position:absolute;

            width:700px;
            height:700px;

            background:rgba(255,255,255,.08);

            border-radius:50%;

            top:-250px;
            left:-200px;

            filter:blur(40px);

        }

        body::after{

            content:"";

            position:absolute;

            width:600px;
            height:600px;

            background:rgba(255,255,255,.05);

            border-radius:50%;

            bottom:-250px;
            right:-150px;

            filter:blur(50px);

        }

        .login-box{

            width:430px;

            background:rgba(255,255,255,.15);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.2);

            border-radius:30px;

            padding:45px;

            box-shadow:
                    0 20px 60px rgba(0,0,0,.25);

            animation:show .8s ease;

            position:relative;

            z-index:10;

        }

        @keyframes show{

            from{

                opacity:0;
                transform:translateY(40px);

            }

            to{

                opacity:1;
                transform:translateY(0);

            }

        }

        .logo{

            font-size:38px;

            text-align:center;

            margin-bottom:15px;

        }

        .logo span{

            color:white;
            font-weight:900;

        }

        h2{

            text-align:center;

            color:white;

            margin-bottom:10px;

            font-size:32px;

        }

        .sub{

            text-align:center;

            color:#dfe6ff;

            margin-bottom:35px;

            font-size:15px;

        }

        .input-group{

            margin-bottom:22px;

            position:relative;

        }

        .input-group input{

            width:100%;

            padding:16px 20px;

            border:none;

            border-radius:14px;

            font-size:15px;

            outline:none;

            background:white;

            transition:.3s;

        }

        .input-group input:focus{

            transform:scale(1.02);

            box-shadow:
                    0 0 15px rgba(0,85,255,.35);

        }

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:15px;

            background:white;

            color:#2450ff;

            font-size:17px;

            font-weight:bold;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#2450ff;

            color:white;

            transform:translateY(-3px);

            box-shadow:
                    0 15px 25px rgba(0,0,0,.2);

        }

        .bottom{

            margin-top:30px;

            text-align:center;

            color:white;

            font-size:14px;

        }

        .bottom a{

            color:#fff;

            font-weight:bold;

            text-decoration:none;

        }

        .bottom a:hover{

            text-decoration:underline;

        }

        @media(max-width:500px){

            .login-box{

                width:90%;

                padding:35px;

            }

            h2{

                font-size:26px;

            }

        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="logo">
        <span>وبلاگینو</span>
    </div>

    <h2>ورود به حساب کاربری</h2>

    <p class="sub">
        برای ادامه وارد حساب خود شوید
    </p>

    <form action="http://localhost:8080/users/login" method="post">

        <div class="input-group">
            <input
                    type="email"
                    name="email"
                    required
                    placeholder="ایمیل خود را وارد کنید">
        </div>

        <div class="input-group">
            <input
                    type="password"
                    name="password"
                    required
                    placeholder="رمز عبور خود را وارد کنید">
        </div>

        <button type="submit">

            ورود

        </button>

        <div class="bottom">

            حساب کاربری ندارید؟

            <a href="http://localhost:8080/register">

                ثبت نام

            </a>

        </div>

    </form>

</div>

</body>

</html>
