<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ایجاد مقاله</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap"
          rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Vazirmatn", sans-serif;
        }

        body {

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #0b1f73, #2b59ff, #5f88ff);

            overflow: hidden;

            position: relative;

        }

        body::before {

            content: "";

            position: absolute;

            width: 700px;
            height: 700px;

            border-radius: 50%;

            background: rgba(255, 255, 255, .08);

            top: -250px;
            left: -200px;

            filter: blur(45px);

        }

        body::after {

            content: "";

            position: absolute;

            width: 650px;
            height: 650px;

            border-radius: 50%;

            background: rgba(255, 255, 255, .05);

            bottom: -250px;
            right: -150px;

            filter: blur(50px);

        }

        .create-box {

            width: 520px;

            padding: 40px;

            border-radius: 30px;

            background: rgba(255, 255, 255, .15);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, .2);

            box-shadow: 0 20px 60px rgba(0, 0, 0, .25);

            position: relative;

            z-index: 10;

            animation: show .8s;

        }

        @keyframes show {

            from {

                opacity: 0;
                transform: translateY(40px);

            }

            to {

                opacity: 1;
                transform: translateY(0);

            }

        }

        .logo {

            text-align: center;

            font-size: 38px;

            font-weight: 900;

            color: white;

            margin-bottom: 10px;

        }

        h2 {

            text-align: center;

            color: white;

            margin-bottom: 10px;

            font-size: 30px;

        }

        .sub {

            text-align: center;

            color: #e8eeff;

            margin-bottom: 30px;

            font-size: 14px;

        }

        .input-group {

            margin-bottom: 20px;

        }

        .input-group input,
        .input-group textarea {

            width: 100%;

            padding: 15px;

            border: none;

            outline: none;

            border-radius: 15px;

            font-size: 15px;

            transition: .3s;

        }

        .input-group input:focus,
        .input-group textarea:focus {

            transform: scale(1.02);

            box-shadow: 0 0 15px rgba(36, 80, 255, .35);

        }

        textarea {

            height: 180px;

            resize: none;

        }

        .title-emoji {

            color: white;

            font-weight: bold;

            margin-bottom: 15px;

        }

        .emoji-box {

            display: grid;

            grid-template-columns:repeat(5, 1fr);

            gap: 12px;

            margin-bottom: 25px;

        }

        .emoji {

            height: 60px;

            background: white;

            border-radius: 15px;

            display: flex;

            justify-content: center;
            align-items: center;

            font-size: 28px;

            cursor: pointer;

            transition: .3s;

        }

        .emoji:hover {

            transform: translateY(-5px);

            background: #2450ff;

            color: white;

        }

        .selected {

            background: #2450ff !important;

            color: white !important;

            box-shadow: 0 10px 20px rgba(36, 80, 255, .3);

        }

        button {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 15px;

            background: white;

            color: #2450ff;

            font-size: 17px;

            font-weight: bold;

            cursor: pointer;

            transition: .3s;

        }

        button:hover {

            background: #2450ff;

            color: white;

            transform: translateY(-4px);

        }

        @media (max-width: 600px) {

            .create-box {

                width: 92%;

                padding: 30px;

            }

            .emoji-box {

                grid-template-columns:repeat(4, 1fr);

            }

        }

    </style>

</head>

<body>

<div class="create-box">

    <div class="logo">

        وبلاگینو

    </div>

    <h2>

        ایجاد مقاله جدید

    </h2>

    <p class="sub">

        مقاله جدید خود را بنویسید.

    </p>

    <form id="blogForm" action="http://localhost:8080/blogs/create" method="post">
        <div class="input-group">

            <input
                    type="text"
                    name="title"
                    required
                    placeholder="عنوان مقاله">

        </div>

        <div class="input-group">

            <input
                    type="text"
                    name="content"
                    required
                    placeholder="محتوای مقاله...">

        </div>

        <button type="submit">

            ثبت مقاله

        </button>

    </form>

</div>
