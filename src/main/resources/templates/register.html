<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ثبت نام | وبلاگینو</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap"
          rel="stylesheet">

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Vazirmatn",sans-serif;

        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    linear-gradient(135deg,#0b1f73,#2b59ff,#4b7cff);

            overflow:hidden;

            position:relative;

        }

        body::before{

            content:"";

            position:absolute;

            width:700px;
            height:700px;

            background:rgba(255,255,255,.08);

            border-radius:50%;

            top:-250px;
            left:-200px;

            filter:blur(40px);

        }

        body::after{

            content:"";

            position:absolute;

            width:600px;
            height:600px;

            background:rgba(255,255,255,.05);

            border-radius:50%;

            bottom:-250px;
            right:-150px;

            filter:blur(50px);

        }

        .register-box{

            width:470px;

            background:rgba(255,255,255,.15);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.2);

            border-radius:30px;

            padding:40px;

            box-shadow:
                    0 20px 60px rgba(0,0,0,.25);

            animation:show .8s ease;

            position:relative;

            z-index:10;

        }

        @keyframes show{

            from{

                opacity:0;
                transform:translateY(40px);

            }

            to{

                opacity:1;
                transform:translateY(0);

            }

        }

        .logo{

            font-size:38px;

            text-align:center;

            margin-bottom:10px;

        }

        .logo span{

            color:white;

            font-weight:900;

        }

        h2{

            text-align:center;

            color:white;

            margin-bottom:8px;

            font-size:30px;

        }

        .sub{

            text-align:center;

            color:#dfe6ff;

            margin-bottom:25px;

            font-size:14px;

        }

        .input-group{

            margin-bottom:18px;

        }

        .input-group input,
        .input-group select{

            width:100%;

            padding:15px;

            border:none;

            outline:none;

            border-radius:14px;

            font-size:15px;

            transition:.3s;

            background:white;

        }

        .input-group input:focus,
        .input-group select:focus{

            transform:scale(1.02);

            box-shadow:
                    0 0 15px rgba(0,85,255,.35);

        }

        select{

            cursor:pointer;

        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:14px;

            font-size:17px;

            font-weight:bold;

            background:white;

            color:#2450ff;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#2450ff;

            color:white;

            transform:translateY(-3px);

            box-shadow:
                    0 15px 25px rgba(0,0,0,.2);

        }

        .bottom{

            margin-top:22px;

            text-align:center;

            font-size:14px;

            color:white;

        }

        .bottom a{

            text-decoration:none;

            font-weight:bold;

            color:white;

        }

        .bottom a:hover{

            text-decoration:underline;

        }

        @media(max-width:520px){

            .register-box{

                width:92%;

                padding:30px;

            }

            h2{

                font-size:25px;

            }

        }

    </style>

</head>

<body>

<div class="register-box">

    <div class="logo">

<span>

وبلاگینو

</span>

    </div>

    <h2>

        ایجاد حساب کاربری

    </h2>

    <p class="sub">

        اطلاعات خود را وارد کنید

    </p>

    <form action="http://localhost:8080/">
        <div class="input-group">

        <input
                type="text"
                id="name"
                placeholder="نام و نام خانوادگی">

    </div>

        <div class="input-group">

            <input
                    type="email"
                    id="email"
                    placeholder="ایمیل">

        </div>

        <div class="input-group">

            <input
                    type="password"
                    id="password"
                    placeholder="رمز عبور">

        </div>

        <div class="input-group">

            <input
                    type="password"
                    id="repeatPassword"
                    placeholder="تکرار رمز عبور">

        </div>

        <div class="input-group">

            <select id="role">

                <option value="USER">

                    کاربر عادی

                </option>

                <option value="ADMIN">

                    مدیر

                </option>

            </select>

        </div>

        <button type="submit">

            ثبت نام

        </button>

        <div class="bottom">

            حساب کاربری دارید؟

            <a href="login.html">

                ورود

            </a>

        </div>

    </form>

</div>

<script>

    const form = document.querySelector("form");

    form.addEventListener("submit",function(event){

        event.preventDefault();

        const password =
            document.getElementById("password").value;

        const repeatPassword =
            document.getElementById("repeatPassword").value;

        if(password !== repeatPassword){

            alert("رمز عبور و تکرار آن یکسان نیست.");

            return;

        }

        alert("ثبت نام با موفقیت انجام شد.");

        // اینجا بعداً fetch می‌زنیم.

    });

</script>

</body>

</html>
